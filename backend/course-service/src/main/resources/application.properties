spring.application.name=course-service
server.port=8081
spring.profiles.default=local

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.security.enabled=true
app.security.jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLWRlbW8tbGVhcm5pdm8tand0LXNlY3JldC1rZXktdGhhdC1pcy1sb25nLWVub3VnaC0xMjM0NTY3ODkw}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.upload-dir=uploads
app.ai.course-recommendations.enabled=${COURSE_AI_RECOMMENDATIONS_ENABLED:false}
app.ai.course-recommendations.base-url=${COURSE_AI_BASE_URL:https://api.openai.com/v1}
app.ai.course-recommendations.api-key=${COURSE_AI_API_KEY:}
app.ai.course-recommendations.model=${COURSE_AI_MODEL:gpt-4.1-mini}
app.ai.course-recommendations.timeout=5s
