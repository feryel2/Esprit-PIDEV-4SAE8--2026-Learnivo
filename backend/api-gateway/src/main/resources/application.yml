server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Configuration CORS globale pour Angular (localhost:4200)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # Routes vers class-service
        - id: class-service-classes
          uri: lb://class-service
          predicates:
            - Path=/api/classes/**

        - id: class-service-professeurs
          uri: lb://class-service
          predicates:
            - Path=/api/professeurs/**

        # Routes vers competition-service
        - id: competition-service-competitions
          uri: lb://competition-service
          predicates:
            - Path=/api/competitions/**

        - id: competition-service-classements
          uri: lb://competition-service
          predicates:
            - Path=/api/classements/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
