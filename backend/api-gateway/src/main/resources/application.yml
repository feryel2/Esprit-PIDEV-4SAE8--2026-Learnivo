server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

      routes:
        # Routes vers class-service
        - id: class-service-classes
          uri: http://localhost:9090
          predicates:
            - Path=/api/classes/**

        - id: class-service-professeurs
          uri: http://localhost:9090
          predicates:
            - Path=/api/professeurs/**

        # Routes vers competition-service
        - id: competition-service-competitions
          uri: http://localhost:8082
          predicates:
            - Path=/api/competitions/**

        - id: competition-service-classements
          uri: http://localhost:8082
          predicates:
            - Path=/api/classements/**

        - id: competition-service-speech
          uri: http://localhost:8082
          predicates:
            - Path=/api/speech/**

        # Routes vers user-service (auth, users, tickets, events)
        - id: user-service-auth
          uri: http://localhost:8085
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: http://localhost:8085
          predicates:
            - Path=/api/users/**

        - id: user-service-tickets
          uri: http://localhost:8085
          predicates:
            - Path=/api/tickets/**

        - id: user-service-events
          uri: http://localhost:8085
          predicates:
            - Path=/api/events/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
