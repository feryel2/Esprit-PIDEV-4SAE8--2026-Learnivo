spring.application.name=quiz-service
server.port=8082
spring.profiles.default=local

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.security.enabled=true
app.security.jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLWRlbW8tbGVhcm5pdm8tand0LXNlY3JldC1rZXktdGhhdC1pcy1sb25nLWVub3VnaC0xMjM0NTY3ODkw}

app.mail.quiz-results.enabled=${QUIZ_EMAIL_ENABLED:false}
app.mail.quiz-results.from=${QUIZ_EMAIL_FROM:no-reply@learnivo.local}

spring.mail.host=${QUIZ_SMTP_HOST:}
spring.mail.port=${QUIZ_SMTP_PORT:587}
spring.mail.username=${QUIZ_SMTP_USERNAME:}
spring.mail.password=${QUIZ_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${QUIZ_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${QUIZ_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.ai.quiz-hints.enabled=${QUIZ_AI_HINTS_ENABLED:false}
app.ai.quiz-hints.base-url=${QUIZ_AI_BASE_URL:https://api.openai.com/v1}
app.ai.quiz-hints.api-key=${QUIZ_AI_API_KEY:}
app.ai.quiz-hints.model=${QUIZ_AI_MODEL:gpt-4.1-mini}
app.ai.quiz-hints.timeout=5s
