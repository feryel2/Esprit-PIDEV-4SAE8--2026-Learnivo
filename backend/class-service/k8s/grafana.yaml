apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-class-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-class-service
  template:
    metadata:
      labels:
        app: grafana-class-service
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-class-service
spec:
  selector:
    app: grafana-class-service
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
