apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-competition-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-competition-service
  template:
    metadata:
      labels:
        app: prometheus-competition-service
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-competition-service
spec:
  selector:
    app: prometheus-competition-service
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
