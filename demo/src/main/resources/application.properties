spring.application.name=learnivo

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/learnivo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Run schema.sql before Hibernate so missing tables (e.g. club_memberships) are created
spring.sql.init.mode=always

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server (use 8085 if 8080 is in use)
server.port=8085

