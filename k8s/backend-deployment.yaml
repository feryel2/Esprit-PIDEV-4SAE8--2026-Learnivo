# Kubernetes Deployment for the Spring Boot Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imed-backend
  labels:
    app: imed-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imed-backend
  template:
    metadata:
      labels:
        app: imed-backend
    spec:
      containers:
        - name: imed-backend
          # TODO: Replace with your real Docker Hub image, e.g. akrimiprojects/imed-backend:latest
          image: your-dockerhub-username/imed-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
