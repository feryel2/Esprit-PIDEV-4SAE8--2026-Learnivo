apiVersion: apps/v1
kind: Deployment
metadata:
  name: learnivo-deployment
  labels:
    app: learnivo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learnivo
  template:
    metadata:
      labels:
        app: learnivo
    spec:
      containers:
      - name: learnivo
        image: bessem785/learnivo:latest
        ports:
        - containerPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: learnivo-service
spec:
  selector:
    app: learnivo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8085
  type: LoadBalancer
