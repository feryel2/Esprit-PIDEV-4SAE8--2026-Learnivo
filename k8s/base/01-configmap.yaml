---
# Global ConfigMap for common configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: learnivo-config
  namespace: learnivo
data:
  EUREKA_SERVER: "http://discovery-server:8761"
  SPRING_PROFILES_ACTIVE: "kubernetes"
  LOG_LEVEL: "INFO"

---
# Discovery Server ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: discovery-server-config
  namespace: learnivo
data:
  application-kubernetes.properties: |
    spring.application.name=discovery-server
    server.port=8761
    eureka.client.register-with-eureka=false
    eureka.client.fetch-registry=false
    eureka.instance.hostname=discovery-server
    eureka.instance.prefer-ip-address=false
    management.endpoints.web.exposure.include=health,info

---
# API Gateway ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: learnivo
data:
  application-kubernetes.properties: |
    spring.application.name=api-gateway
    server.port=8080
    eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
    eureka.instance.prefer-ip-address=true
    eureka.instance.hostname=api-gateway-pod
    spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary, RETAIN_FIRST
    spring.cloud.gateway.server.webflux.routes[0].id=course-service-api
    spring.cloud.gateway.server.webflux.routes[0].uri=lb://course-service
    spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/courses/**
    spring.cloud.gateway.server.webflux.routes[1].id=course-service-uploads
    spring.cloud.gateway.server.webflux.routes[1].uri=lb://course-service
    spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/uploads/**
    spring.cloud.gateway.server.webflux.routes[2].id=quiz-service-api
    spring.cloud.gateway.server.webflux.routes[2].uri=lb://quiz-service
    spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/quizzes/**
    spring.cloud.gateway.server.webflux.routes[3].id=user-service-auth
    spring.cloud.gateway.server.webflux.routes[3].uri=lb://user-service
    spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/auth/**
    spring.cloud.gateway.server.webflux.routes[4].id=user-service-users
    spring.cloud.gateway.server.webflux.routes[4].uri=lb://user-service
    spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/users/**
    management.endpoints.web.exposure.include=health,info,gateway

---
# User Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: learnivo
data:
  application-kubernetes.properties: |
    spring.application.name=user-service
    server.port=8083
    eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
    eureka.instance.prefer-ip-address=true
    eureka.instance.hostname=user-service-pod
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=false
    app.security.enabled=true
    management.endpoints.web.exposure.include=health,info

---
# Course Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: course-service-config
  namespace: learnivo
data:
  application-kubernetes.properties: |
    spring.application.name=course-service
    server.port=8081
    eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
    eureka.instance.prefer-ip-address=true
    eureka.instance.hostname=course-service-pod
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=false
    spring.servlet.multipart.max-file-size=25MB
    spring.servlet.multipart.max-request-size=25MB
    app.upload-dir=/data/uploads
    app.security.enabled=true
    app.ai.course-recommendations.enabled=false
    management.endpoints.web.exposure.include=health,info

---
# Quiz Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: quiz-service-config
  namespace: learnivo
data:
  application-kubernetes.properties: |
    spring.application.name=quiz-service
    server.port=8082
    eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
    eureka.instance.prefer-ip-address=true
    eureka.instance.hostname=quiz-service-pod
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=false
    app.security.enabled=true
    management.endpoints.web.exposure.include=health,info
