<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-lg">
    <div class="bg-white shadow rounded-lg overflow-hidden">
      <div class="bg-blue-600 text-white px-6 py-4">
        <h3 class="text-lg font-semibold">Register</h3>
      </div>
      <div class="p-6">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
              <input type="email" id="email" formControlName="email" required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" />
              <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
                class="text-sm text-red-600 mt-1">Valid email is required</div>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
              <input type="password" id="password" formControlName="password" required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" />
              <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
                class="text-sm text-red-600 mt-1">Password must be at least 6 characters</div>
            </div>
          </div>

          <div class="mt-4">
            <label for="role" class="block text-sm font-medium text-gray-700">Role</label>
            <select id="role" formControlName="role"
              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
              <option [value]="roles[0]">Student</option>
              <option [value]="roles[1]">Society Agent</option>
            </select>
          </div>

          <div *ngIf="isSocietyAgent" class="mt-4 border border-gray-200 p-4 rounded">
            <h5 class="font-medium mb-2">Society Information</h5>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label for="societyName" class="block text-sm font-medium text-gray-700">Society Name</label>
                <input type="text" id="societyName" formControlName="societyName"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
              </div>
              <div>
                <label for="societyEmail" class="block text-sm font-medium text-gray-700">Society Email</label>
                <input type="email" id="societyEmail" formControlName="societyEmail"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
              </div>
              <div>
                <label for="societyPhone" class="block text-sm font-medium text-gray-700">Society Phone</label>
                <input type="text" id="societyPhone" formControlName="societyPhone"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
              </div>
              <div>
                <label for="societyAddress" class="block text-sm font-medium text-gray-700">Society Address</label>
                <input type="text" id="societyAddress" formControlName="societyAddress"
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
              </div>
            </div>
          </div>

          <div *ngIf="error" class="mt-4 text-sm text-red-700">{{ error }}</div>

          <div class="mt-6 flex items-center justify-between">
            <button type="submit" [disabled]="registerForm.invalid"
              class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:opacity-50">Register</button>
            <a class="text-sm text-blue-600 hover:underline" routerLink="/login">Already have an account?</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
