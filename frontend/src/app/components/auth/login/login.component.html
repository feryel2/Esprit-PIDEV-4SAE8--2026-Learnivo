<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="bg-white shadow rounded-lg overflow-hidden">
      <div class="bg-blue-600 text-white px-6 py-4">
        <h3 class="text-lg font-semibold">Login</h3>
      </div>
      <div class="p-6">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" id="email" formControlName="email" required
              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" />
            <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
              class="text-sm text-red-600 mt-1">Valid email is required</div>
          </div>

          <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" id="password" formControlName="password" required
              class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" />
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
              class="text-sm text-red-600 mt-1">Password is required</div>
          </div>

          <div class="mb-4 w-full flex flex-col items-center">
            <re-captcha formControlName="recaptchaToken" [siteKey]="recaptchaSiteKey"></re-captcha>
          </div>

          <div *ngIf="error" class="mb-4 text-sm text-red-700">{{ error }}</div>

          <div class="flex items-center justify-between">
            <button type="submit" [disabled]="loginForm.invalid"
              class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:opacity-50">Login</button>
            <a class="text-sm text-blue-600 hover:underline" routerLink="/register">Create an account</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
