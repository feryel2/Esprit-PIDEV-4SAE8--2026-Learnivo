<div class="container mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-xl font-semibold">Users Management</h3>
    <button (click)="openCreate()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Create
      user</button>
  </div>

  <div class="overflow-x-auto bg-white shadow rounded">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">ID</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Email</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Role</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Status</th>
          <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let u of users">
          <td class="px-4 py-3 text-sm text-gray-700">{{ u.id }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">{{ u.email }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">{{ u.role }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">{{ u.status }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">
            <button (click)="openEdit(u)" class="mr-2 text-blue-600 hover:underline">Edit</button>
            <button (click)="deleteUser(u.id)" class="text-red-600 hover:underline">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="flex items-center justify-between mt-4">
    <div class="text-sm text-gray-600">Page {{ page + 1 }} — Total {{ totalElements }}</div>
    <div class="space-x-2">
      <button (click)="prevPage()" [disabled]="page===0" class="px-3 py-1 bg-gray-100 rounded">Prev</button>
      <button (click)="nextPage()" class="px-3 py-1 bg-gray-100 rounded">Next</button>
    </div>
  </div>

  <!-- User Form Modal -->
  <div *ngIf="showForm" class="modal-overlay">
    <div class="modal-content">
      <h4 class="text-xl font-bold mb-6 text-gray-800">{{ editingId ? 'Edit user' : 'Create user' }}</h4>
      <form [formGroup]="form" (ngSubmit)="submit()" class="grid grid-cols-1 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input formControlName="email"
            class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
        </div>

        <div *ngIf="!editingId">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input type="password" formControlName="password"
            class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Role</label>
          <select formControlName="role"
            class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">First name</label>
            <input formControlName="firstName"
              class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Last name</label>
            <input formControlName="lastName"
              class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
          <select formControlName="status"
            class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
            <option value="ACTIVE">ACTIVE</option>
            <option value="SUSPENDED">SUSPENDED</option>
            <option value="INACTIVE">INACTIVE</option>
          </select>
        </div>

        <div class="flex gap-3 justify-end mt-6 border-t pt-4">
          <button type="button" (click)="cancel()"
            class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-all font-medium">Cancel</button>
          <button type="submit"
            class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all font-medium shadow-sm">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
